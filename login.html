<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap LOCAL -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="css/navbar.css" rel="stylesheet">
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="navbar-placeholder"></div>

<section class="vh-100" style="background-color: #000000;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      
      <!-- 🔥 AQUÍ ESTÁ LA MEJORA -->
      <div class="col-12 d-flex justify-content-center">
        <div class="card shadow mx-auto" style="border-radius: 1rem; max-width: 900px; width: 100%;">
          
          <div class="row g-0">

            <!-- Imagen -->
            <div class="col-md-6 col-lg-5 d-none d-md-block">
              <img src="img/login.jpg"
                alt="login form" class="img-fluid h-100"
                style="border-radius: 1rem 0 0 1rem; object-fit: cover;" />
            </div>

            <!-- Formulario -->
            <div class="col-md-6 col-lg-7 d-flex align-items-center">
              <div class="card-body p-4 p-lg-5 text-black">

                <form>

                  <div class="d-flex align-items-center mb-3 pb-1">
                    <i class="fas fa-book fa-2x me-3" style="color: #ff6219;"></i>
                    <span class="h1 fw-bold mb-0">Libros</span>
                  </div>

                  <h5 class="fw-normal mb-3 pb-3">Inicia sesión en tu cuenta</h5>

                  <div class="mb-4">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control form-control-lg" placeholder="Ingresa tu correo">
                  </div>

                  <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control form-control-lg" placeholder="Ingresa tu contraseña">
                  </div>

                  <div class="mb-4">
                    <button class="btn btn-dark btn-lg w-100">Login</button>
                  </div>

                  <a href="#" class="small text-muted">¿Olvidaste tu contraseña?</a>

                  <p class="mt-3">
                    ¿No tienes cuenta?
                    <a href="#">Regístrate aquí</a>
                  </p>

                </form>

              </div>
            </div>

          </div>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- Bootstrap JS LOCAL -->
<script src="js/bootstrap.bundle.min.js"></script>

<script>
    // Función para cargar HTML parcial en un elemento
    function loadComponent(url, elementId) {
        fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById(elementId).innerHTML = data;
            })
            .catch(error => console.error('Error cargando ' + url + ':', error));
    }

    document.addEventListener('DOMContentLoaded', function() {
        //aca es donde enlaza la pag html con el id del div donde se va a cargar el componente :v
        loadComponent('navbar.html', 'navbar-placeholder');
    });
</script>

</body>
</html>
